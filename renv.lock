      "NeedsCompilation": "no",
      "Author": "Neal Haddaway [aut] (<https://orcid.org/0000-0003-3902-2234>), Luke McGuinness [aut] (<https://orcid.org/0000-0001-8730-9761>), Chris Pritchard [aut, cre] (<https://orcid.org/0000-0002-1143-9751>), Brennan Chapman [ctb], Hossam Hammady [ctb]",
